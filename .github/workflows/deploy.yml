name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      ref:
        description: "Git ref to deploy"
        required: true
        default: main
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/enterprise-crypto

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      frontend-image: ${{ steps.frontend-meta.outputs.tags }}
      backend-image: ${{ steps.backend-meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract frontend metadata
        id: frontend-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=raw,value=${{ inputs.environment }}-latest
            type=sha,prefix=${{ inputs.environment }}-

      - name: Extract backend metadata
        id: backend-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=raw,value=${{ inputs.environment }}-latest
            type=sha,prefix=${{ inputs.environment }}-

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}

      - name: Summarize image outputs
        run: |
          {
            echo "## Deploy Images"
            echo ""
            echo "- Frontend: \`${{ steps.frontend-meta.outputs.tags }}\`"
            echo "- Backend: \`${{ steps.backend-meta.outputs.tags }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-to-northflank:
    name: Trigger Northflank Deploy
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      STAGING_WEBHOOK: ${{ secrets.NORTHFLANK_STAGING_DEPLOY_WEBHOOK }}
      PRODUCTION_WEBHOOK: ${{ secrets.NORTHFLANK_PRODUCTION_DEPLOY_WEBHOOK }}
    steps:
      - name: Trigger staging deployment
        if: ${{ inputs.environment == 'staging' && env.STAGING_WEBHOOK != '' }}
        run: curl --fail --show-error --silent --request POST "$STAGING_WEBHOOK"

      - name: Trigger production deployment
        if: ${{ inputs.environment == 'production' && env.PRODUCTION_WEBHOOK != '' }}
        run: curl --fail --show-error --silent --request POST "$PRODUCTION_WEBHOOK"

      - name: Summarize deployment trigger
        run: |
          {
            echo "## Platform Trigger"
            echo ""
            if [ "${{ inputs.environment }}" = "staging" ] && [ -n "$STAGING_WEBHOOK" ]; then
              echo "- Northflank staging deploy triggered."
            elif [ "${{ inputs.environment }}" = "production" ] && [ -n "$PRODUCTION_WEBHOOK" ]; then
              echo "- Northflank production deploy triggered."
            else
              echo "- Images published, but no Northflank webhook secret is configured for this environment."
              echo "- Configure \`NORTHFLANK_STAGING_DEPLOY_WEBHOOK\` or \`NORTHFLANK_PRODUCTION_DEPLOY_WEBHOOK\` in the matching GitHub Environment to enable full CD."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
