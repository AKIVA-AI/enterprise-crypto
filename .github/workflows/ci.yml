name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: bun run eslint . --ext .ts,.tsx --max-warnings=0

      - name: Run tests with coverage
        run: bun run vitest run --reporter=verbose --coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/

      - name: Security audit
        run: npm audit --audit-level=high

  backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost"
          sudo apt-get clean
          docker system prune -af
          pip cache purge || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install bandit pip-audit ruff

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app/ --select E,W,F --ignore E501

      - name: Security scan (bandit)
        working-directory: backend
        run: bandit -r app/ -ll -ii --exclude app/gpu/ -f json -o bandit-report.json || bandit -r app/ -ll -ii --exclude app/gpu/

      - name: Dependency audit (pip-audit)
        working-directory: backend
        run: pip-audit -r requirements-ci.txt --strict --desc

      - name: Run tests with coverage
        working-directory: backend
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=60 -q

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-py${{ matrix.python-version }}
          path: backend/coverage.xml

      - name: Build Docker image
        if: matrix.python-version == '3.12'
        working-directory: backend
        run: docker build -t enterprise-crypto-backend .

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to staging
        run: |
          echo "=== Staging Deploy ==="
          echo "Commit: ${{ github.sha }}"
          echo "Staging deploy placeholder — configure when infrastructure is ready."
          echo "Deploy script: scripts/deploy.sh staging"
          echo "Rollback script: scripts/rollback.sh <previous-tag> staging"

      - name: Health check
        run: |
          echo "=== Health Check ==="
          echo "Health check placeholder — will curl staging endpoint when deployed."
          echo "Expected: GET /health -> 200 OK"

      - name: Rollback validation
        run: |
          echo "=== Rollback Readiness ==="
          echo "Rollback script exists: $(test -f scripts/rollback.sh && echo 'YES' || echo 'NO')"
          echo "Deploy script exists: $(test -f scripts/deploy.sh && echo 'YES' || echo 'NO')"

  ci-diagnosis:
    name: RADAR CI Diagnosis
    runs-on: ubuntu-latest
    needs: [frontend, backend, deploy-staging]
    if: >-
      always() &&
      (needs.frontend.result == 'failure' ||
       needs.backend.result == 'failure')

    steps:
    - name: Diagnose CI failures
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        echo "## RADAR CI Diagnosis" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "**Failed jobs:**" >> "$GITHUB_STEP_SUMMARY"
        if [ "${{ needs.frontend.result }}" = "failure" ]; then echo "- **frontend**: FAILED" >> "$GITHUB_STEP_SUMMARY"; fi
        if [ "${{ needs.backend.result }}" = "failure" ]; then echo "- **backend**: FAILED" >> "$GITHUB_STEP_SUMMARY"; fi
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "### Failed Step Logs" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        gh run view ${{ github.run_id }} --log-failed 2>&1 | tail -200 >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
