name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: bun run eslint . --ext .ts,.tsx --max-warnings=0

      - name: Run tests with coverage
        run: bun run vitest run --reporter=verbose --coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/

      - name: Security audit
        run: npm audit --audit-level=high

  backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost"
          sudo apt-get clean
          docker system prune -af
          pip cache purge || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install bandit pip-audit ruff

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app/ --select E,W,F --ignore E501

      - name: Security scan (bandit)
        working-directory: backend
        run: bandit -r app/ -ll -ii --exclude app/gpu/ -f json -o bandit-report.json || bandit -r app/ -ll -ii --exclude app/gpu/

      - name: Dependency audit (pip-audit)
        working-directory: backend
        run: pip-audit -r requirements-ci.txt --strict --desc

      - name: Run tests with coverage
        working-directory: backend
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=39 -x -q

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-py${{ matrix.python-version }}
          path: backend/coverage.xml

      - name: Build Docker image
        if: matrix.python-version == '3.12'
        working-directory: backend
        run: docker build -t akiva-ai-crypto-backend .
